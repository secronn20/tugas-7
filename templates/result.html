<!DOCTYPE html>
<html>
<head>

<title>Hasil Prediksi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:
linear-gradient(
135deg,
#050505,
#170000
);
color:white;
font-family:Arial;
}

.card{
margin-top:100px;
background:#111;
border:1px solid red;
border-radius:30px;
box-shadow:
0 0 35px rgba(255,0,0,.35);
}

.score{
font-size:80px;
font-weight:900;
color:#ff3131;
text-shadow:
0 0 20px red;
}

.btn-red{
background:red;
border:none;
padding:14px 30px;
border-radius:15px;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card p-5 text-center">

<h2>
HASIL PREDIKSI AI
</h2>

<hr>

<p>
Skor Kualitas Tidur
</p>

<div class="score">
{{prediction}}
</div>

<h3 class="mt-4">
Kategori:
{{kategori}}
</h3>

<a
href="/"
class="btn btn-red mt-4">
Prediksi Lagi
</a>

</div>

</div>

</div>

</div>

</body>
</html>
